{% extends "base.html" %}
{% block title %}Register — AI CyberSec Assistant{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🛡️</div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Set up your cybersecurity workspace</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="3-32 alphanumeric characters" required
                    autocomplete="username" maxlength="32" pattern="[a-zA-Z0-9_]{3,32}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                    placeholder="Min 8 chars, uppercase, lowercase, digit" required autocomplete="new-password"
                    minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Re-enter your password" required
                    autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                ✅ Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}

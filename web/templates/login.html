{% extends "base.html" %}
{% block title %}Login — AI CyberSec Assistant{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🛡️</div>
            <h1>AI CyberSec Assistant</h1>
            <p class="auth-subtitle">Secure • Private • Offline-Ready</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required
                    autocomplete="username" maxlength="32">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                🔐 Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}

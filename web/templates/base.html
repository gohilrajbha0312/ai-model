<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Cybersecurity Assistant - Secure, Private, Offline-Ready">
    <title>{% block title %}AI CyberSec Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🛡️</span>
            <span class="nav-title">CyberSec AI</span>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('chat') }}" class="nav-link {% if request.endpoint == 'chat' %}active{% endif %}">
                💬 Chat
            </a>
            <a href="{{ url_for('tools') }}" class="nav-link {% if request.endpoint == 'tools' %}active{% endif %}">
                🛠️ Tools
            </a>
            <a href="{{ url_for('logs') }}" class="nav-link {% if request.endpoint == 'logs' %}active{% endif %}">
                📋 Logs
            </a>
            <a href="{{ url_for('settings') }}"
                class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">
                ⚙️ Settings
            </a>
        </div>
        <div class="nav-user">
            <span class="user-badge">⚡ Ready</span>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
